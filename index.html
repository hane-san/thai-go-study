se .th{font-size:1.08rem;color:var(--thai);font-weight:950;line-height:1.2}.speakable{cursor:pointer}.playing{outline:2px solid var(--gold);background:linear-gradient(180deg,rgba(243,183,77,.24),#fffaf0)!important}.speakmini{position:absolute;right:7px;top:7px;border:0;background:rgba(21,148,129,.11);color:#14636f;border-radius:999px;font-size:.5rem;font-weight:950;padding:.18rem .38rem}.generator{position:sticky;top:0;z-index:3;margin-bottom:9px;border-radius:22px;border:1px solid rgba(255,255,255,.72);background:linear-gradient(180deg,#fffdf8,#fff3dc);box-shadow:0 12px 26px rgba(10,32,50,.16);padding:10px}.genlabel{font-size:.52rem;font-weight:950;color:#9a6420}.genphrase{font-size:1.20rem;line-height:1.25;font-weight:950;color:#12355b;margin:.18rem 0}.genjp{font-size:.58rem;font-weight:850;color:#4a392f}.genbtns{display:flex;gap:6px;margin-top:8px}.smallbtn{border:0;border-radius:999px;background:#143d5a;color:#fff;font-size:.54rem;font-weight:950;padding:.42rem .58rem}.smallbtn.secondary{background:#fff;border:1px solid var(--line);color:#16445e}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.wordcard,.lettercard,.numcard{box-shadow:0 7px 16px rgba(10,32,50,.08);border-radius:18px;padding:8px;background:linear-gradient(180deg,#fff,#fff9ed)}.wordcard .th,.lettercard .big,.numcard .th{font-size:1.05rem;font-weight:950;color:var(--thai);line-height:1.15}.pill{display:inline-block;font-size:.46rem;font-weight:950;color:#fff;background:linear-gradient(90deg,#c7773d,#d96d5c);border-radius:999px;padding:.16rem .34rem;margin-top:4px}.sectionTitle{font-size:.72rem;font-weight:950;color:#fff;margin:6px 4px 6px;text-shadow:0 1px 8px rgba(0,0,0,.24)}.leftIntro{font-size:.58rem;line-height:1.55;color:#fff;margin:0 4px 8px;opacity:.94}.alphabetGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}.lettercard{padding:7px 6px}.lettercard .big{font-size:1.35rem;text-align:center}.lettercard .name{font-size:.48rem;text-align:center;colo /* --- Bangkok street-pop refresh --- */
:root{
  --bg1:#ff7a59; --bg2:#00a6a6; --bg3:#ffd166;
  --paper:#fff9ef; --paper2:#fffef9; --ink:#24170f; --muted:#6b5b4e;
  --thai:#33201a; --blue:#087ca7; --teal:#00a896; --gold:#ffc145; --rose:#ef476f;
  --line:rgba(70,45,28,.13); --shadow:0 12px 24px rgba(80,43,23,.16);
}
body{
  background:
    radial-gradient(circle at 9% 4%,rgba(255,209,102,.62),transparent 12rem),
    radial-gradient(circle at 92% 10%,rgba(239,71,111,.36),transparent 16rem),
    radial-gradient(circle at 18% 92%,rgba(0,168,150,.28),transparent 18rem),
    linear-gradient(145deg,#ff7a59 0%,#ffb347 32%,#00a896 68%,#087ca7 100%);
}
body::before{
  opacity:.20;
  background:
    radial-gradient(circle at 18px 18px,rgba(255,255,255,.44) 0 2px,transparent 2.5px),
    radial-gradient(circle at 54px 42px,rgba(255,255,255,.30) 0 3px,transparent 3.5px),
    linear-gradient(135deg,rgba(255,255,255,.18) 0 8%,transparent 8.3% 100%);
  background-size:72px 72px,96px 96px,44px 44px;
  mix-blend-mode:screen;
}
header{
  background:linear-gradient(90deg,#ef476f,#ff9f1c 54%,#00a896);
  border-bottom:1px solid rgba(255,255,255,.34);
}
.panelnav{
  background:linear-gradient(90deg,rgba(8,124,167,.92),rgba(0,168,150,.88),rgba(239,71,111,.78));
  border-bottom:1px solid rgba(255,255,255,.22);
}
.navbtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28)}
.navbtn.active{background:linear-gradient(90deg,#fff7d6,#ffffff);color:#2f5a53}
.lessonTabs{background:rgba(255,252,242,.96)}
.tab{color:#087ca7;border-color:rgba(8,124,167,.16)}
.tab.active{background:linear-gradient(90deg,#ef476f,#ff9f1c);color:#fff}
.card,.sheet,.wordcard,.lettercard,.numcard{
  border:1px solid rgba(255,255,255,.70);
  box-shadow:var(--shadow);
}
.top{color:#fff}
.top::after{
  opacity:.20;
  background:
    linear-gradient(90deg,rgba(255,255,255,.0) 0 20%,rgba(255,255,255,.65) 21% 28%,rgba(255,255,255,.0) 29% 100%),
    radial-gradient(circle at 50% 50%,rgba(255,255,255,.72) 0 10%,transparent 11%);
  transform:rotate(-12deg);
}
.top.lesson{background:linear-gradient(135deg,#ef476f,#ff9f1c)}
.top.left{background:linear-gradient(135deg,#087ca7,#00a896)}
.top.right{background:linear-gradient(135deg,#ff9f1c,#ef476f)}
.hintbox h2{color:#087ca7}
.formula{border:1px dashed rgba(239,71,111,.28);background:#fffef9}
.roman{color:#087ca7}.kana{color:#b85a16}
.tag{background:linear-gradient(90deg,#00a896,#087ca7)}
.phrase{background:linear-gradient(180deg,#fff,#fff7e8);box-shadow:0 6px 14px rgba(80,43,23,.08)}
.speakmini{background:rgba(0,168,150,.12);color:#087063}
.generator{
  background:
    linear-gradient(180deg,#fffef9,#fff4db),
    linear-gradient(90deg,rgba(239,71,111,.10),rgba(0,168,150,.10));
  border:1px solid rgba(255,159,28,.28);
}
.genphrase{color:#33201a}
.smallbtn{background:linear-gradient(90deg,#087ca7,#00a896)}
.smallbtn.secondary{background:#fff;color:#087ca7}
.wordcard,.lettercard,.numcard{background:linear-gradient(180deg,#fff,#fff8e8)}
.lettercard{background:linear-gradient(180deg,#ffffff,#f1fffb)}
.lettercard .name{color:#087ca7}
.pill{background:linear-gradient(90deg,#ef476f,#ff9f1c)}
.catbtn{background:linear-gradient(90deg,rgba(8,124,167,.82),rgba(0,168,150,.78));border:1px solid rgba(255,255,255,.38)}
.catbtn.active{background:#fff;color:#ef476f}
.thparts{display:inline;line-height:1.45}
.thchip{
  display:inline-block;
  margin:.07rem .05rem;
  padding:.05rem .16rem .08rem;
  border-radius:.42rem;
  line-height:1.15;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone;
}
.thchip.base{background:rgba(0,168,150,.14);color:#075e5b}
.thchip.slot{background:rgba(255,159,28,.24);color:#7c3f00;box-shadow:inset 0 -2px 0 rgba(255,159,28,.30)}
.thchip.soft{background:rgba(239,71,111,.13);color:#9b2448}
.thchip.polite{background:rgba(8,124,167,.13);color:#075f82}
.thchip.neg{background:rgba(70,70,70,.11);color:#333}
.formula .th .thchip,.genphrase .thchip{font-size:inherit}
.phrase .th .thparts{white-space:normal}
.phrase .th .thchip{
  margin:0;
  padding:.015rem .035rem .045rem;
  border-radius:.22rem;
  line-height:1.16;
  vertical-align:baseline;
}
.functionLegend{
  display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;
}
.functionLegend span{
  font-size:.48rem;font-weight:950;border-radius:999px;padding:.16rem .36rem;background:#fff;border:1px solid var(--line);
}
.functionLegend .b{color:#075e5b}.functionLegend .s{color:#7c3f00}.functionLegend .p{color:#075f82}

.lessonExplain{position:relative;overflow:hidden}
.lessonExplain::before{
  content:"";position:absolute;right:-20px;top:-20px;width:92px;height:92px;border-radius:50%;
  background:repeating-linear-gradient(45deg,rgba(239,71,111,.12) 0 8px,rgba(255,191,63,.15) 8px 16px);
  pointer-events:none;
}
.mk{
  background:linear-gradient(transparent 58%, rgba(255,230,109,.70) 58%);
  color:#4a3412;
  padding:0 .05rem;
  border-radius:.18rem;
  font-weight:950;
}
.mk2{
  background:rgba(0,168,150,.12);
  color:#075e5b;
  padding:.02rem .16rem;
  border-radius:.38rem;
  font-weight:950;
}
.grammarBox{
  margin-top:9px;
  display:grid;
  gap:7px;
}
.grammarHead{
  display:inline-flex;
  width:max-content;
  max-width:100%;
  font-size:.56rem;
  font-weight:950;
  color:#fff;
  background:linear-gradient(90deg,#ef476f,#ff9f1c);
  padding:.24rem .55rem;
  border-radius:999px;
  box-shadow:0 6px 14px rgba(239,71,111,.14);
}
.grammarItem{
  background:linear-gradient(180deg,#ffffff,#fff8e9);
  border:1px solid rgba(255,159,28,.22);
  border-radius:16px;
  padding:8px 9px;
  box-shadow:0 5px 12px rgba(20,40,60,.05);
}
.grammarLabel{
  font-size:.58rem;
  font-weight:950;
  color:#087ca7;
  margin-bottom:3px;
}
.grammarItem p{
  font-size:.56rem;
  line-height:1.62;
  margin:.1rem 0 0;
  color:#3c302b;
}
.thparts.spacedParts .thchip.spaced{
  margin:.07rem .08rem;
  padding:.07rem .20rem .10rem;
}

/* --- v4: もう少し屋台ポップ＋文法カードの視線誘導 --- */
header{position:relative;overflow:hidden}
header::after{content:"ตลาด・คาเฟ่・รถไฟ";position:absolute;right:10px;bottom:-8px;font-size:.46rem;font-weight:950;color:rgba(255,255,255,.55);letter-spacing:.06em;pointer-events:none}.top.lesson .title::before{content:"☕ "}.top.right .title::before{content:"🍜 "}.top.left .title::before{content:"🪧 "}.grammarHead::before{content:"📝";margin-right:.25rem}.grammarItem{border-left:5px solid rgba(239,71,111,.55)}.grammarItem:nth-child(3n){border-left-color:rgba(0,168,150,.62)}.grammarItem:nth-child(3n+1){border-left-color:rgba(255,159,28,.70)}.mk{box-shadow:inset 0 -0.38em rgba(255,230,109,.72)}.mk2{border:1px solid rgba(0,168,150,.18)}.phrase .jp::before{content:"→ ";color:#ef476f;font-weight:950}

/* --- v6: 表示名を自然化＋街歩きポップを少し追加 --- */
header .sub{letter-spacing:.01em}
.badge{background:rgba(255,255,255,.20);box-shadow:0 6px 14px rgba(0,0,0,.10)}
.generator::before{content:"今日の言い換え";display:inline-flex;font-size:.48rem;font-weight:950;color:#fff;background:linear-gradient(90deg,#ef476f,#ff9f1c);border-radius:999px;padding:.16rem .44rem;margin-bottom:.25rem}
.functionLegend span{box-shadow:0 3px 8px rgba(20,40,60,.04)}
.functionLegend .n{color:#333}
.wordcard:hover,.phrase:hover{transform:translateY(-1px)}


/* --- v7: 23課化・支払い/写真/聞き返しの屋台ポップ --- */
.top.lesson{background:linear-gradient(135deg,#ef476f 0%,#ff9f1c 52%,#00a896 100%)}
.grammarHead{background:linear-gradient(90deg,#00a896,#087ca7,#ef476f)}
.genlabel::before{content:"🛵 ";}
.smallbtn{box-shadow:0 5px 10px rgba(8,124,167,.10)}
.phrase:nth-child(4n+1){border-left:4px solid rgba(255,159,28,.78)}
.phrase:nth-child(4n+2){border-left:4px solid rgba(0,168,150,.62)}
.phrase:nth-child(4n+3){border-left:4px solid rgba(239,71,111,.55)}
.phrase:nth-child(4n){border-left:4px solid rgba(8,124,167,.52)}
.tagrow .tag:nth-child(odd){background:rgba(255,159,28,.16);border-color:rgba(255,159,28,.22)}
.tagrow .tag:nth-child(even){background:rgba(0,168,150,.11);border-color:rgba(0,168,150,.18)}


/* --- v8: 街歩きポップを少しだけ増量 --- */
.lessonTabs{background:linear-gradient(90deg,rgba(255,230,109,.92),rgba(0,168,150,.88),rgba(239,71,111,.86));border-top:2px dashed rgba(255,255,255,.6)}
.tab.active{transform:translateY(-2px) rotate(-1deg);box-shadow:0 8px 18px rgba(239,71,111,.24)}
.sheet{border-image:linear-gradient(135deg,#ffe66d,#00a896,#ef476f) 1;border-width:1px;border-style:solid}
.grammarBox{background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,250,230,.92));}
.grammarItem::before{content:"★";color:#ef476f;font-size:.72rem;margin-right:.25rem;vertical-align:middle}
.wordcard:hover,.phrase:hover{transform:translateY(-1px)}

/* --- v10: 市場・道案内・トラブル用の小さなポップ補強 --- */
.grammarHead::after{content:"  読み方もここで確認";font-size:.72rem;color:#087ca7;background:rgba(255,230,109,.7);border-radius:999px;padding:.18rem .45rem;margin-left:.35rem}
.top.lesson .micro::before{content:"✦ ";color:#ffe66d}
.genlabel::before{content:"屋台メモ ";font-weight:900;color:#ef476f}
.catbtn[data-cat="shopping"],.catbtn[data-cat="direction"],.catbtn[data-cat="trouble"]{border-style:dashed}

}
header::after{content:"กรุงเทพ · ตลาด · คาเฟ่";right:12px;bottom:-7px;color:rgba(255,255,255,.50)}
.sub{font-weight:800;opacity:.92}.badge{background:rgba(255,255,255,.20)}
.panelnav{background:rgba(14,38,58,.78)}

function cleanSpeakText(text){

function speak(text, slow=false){

function segmentFallback(body, polite){
  const out=[]; let i=0;
  const push=(text,role)=>{ if(text) out.push({text,role}); };
  while(i<body.length){
    let found=null;
    for(const [tok,role] of colorTokenRoles){ if(body.startsWith(tok,i)){ found=[tok,role]; break; } }
    if(found){ push(found[0],found[1]); i+=found[0].length; continue; }
    let j=i+1;
    while(j<body.length && !colorTokenRoles.some(([tok])=>body.startsWith(tok,j))) j++;

  if(l.mode==='direction') return {th:`ไปทาง${th}ใช่ไหมครับ`, ro:`pai thaang ${ro} châi mái khráp`, ka:`パイ ターン ${ka} チャイ マイ クラップ`, jp:`${jp}の方向で合っていますか。`, parts:[{text:'ไป',role:'base'},{text:'ทาง',role:'soft'},{text:th,role:'slot'},{text:'ใช่ไหม',role:'soft'},{text:'ครับ',role:'polite'}]};
  if(l.mode==='lost') return {th:`ผมทำ${th}หายครับ`, ro:`phǒm tham ${ro} hǎai khráp`, ka:`ポム タム ${ka} ハーイ クラップ`, jp:`${jp}をなくしました。`, parts:[{text:'ผม',role:'slot'},{text:'ทำ',role:'base'},{text:th,role:'slot'},{text:'หาย',role:'neg'},{text:'ครับ',role:'polite'}]};
  if(l.mode==='book') return {th:`จอง${th}ได้ไหมครับ`, ro:`jɔɔng ${ro} dâi mái khráp`, ka:`ジョーン ${ka} ダイ マイ クラップ`, jp:`${jp}を予約できますか。`, parts:[{text:'จอง',role:'base'},{text:th,role:'slot'},{text:'ได้ไหม',role:'soft'},{text:'ครับ',role:'polite'}]};
  if(l.mode==='meaning') return {th:`หมายความว่า${th}ใช่ไหมครับ`, ro:`mǎai-khwaam-wâa ${ro} châi mái khráp`, ka:`マーイクワームワー ${ka} チャイ マイ クラップ`, jp:`${jp}という意味で合っていますか。`, parts:[{text:'หมายความว่า',role:'base'},{text:th,role:'slot'},{text:'ใช่ไหม',role:'soft'},{text:'ครับ',role:'polite'}]};
  if(l.mode==='mustDo') return {th:`ต้อง${th}ไหมครับ`, ro:`tɔ̂ng ${ro} mái khráp`, ka:`トン ${ka} マイ クラップ`, jp:`${jp}必要がありますか。`, parts:[{text:'ต้อง',role:'soft'},{text:th,role:'slot'},{text:'ไหม',role:'soft'},{text:'ครับ',role:'polite'}]};
  if(l.slot==='noun') return {th:`ขอ${th}หน่อยครับ`, ro:`khɔ̌ɔ ${ro} nɔ̀i khráp`, ka:`コー ${ka} ノイ クラップ`, jp:`${jp}をください／お願いします。`, parts:[{text:'ขอ',role:'base'},{text:th,role:'slot'},{text:'หน่อย',role:'soft'},{text:'ครับ',role:'polite'}]};
  if(l.slot==='food') return {th:`เอา${th}ครับ`, ro:`ao ${ro} khráp`, ka:`アオ ${ka} クラップ`, jp:`${jp}にします。`, parts:[{text:'เอา',role:'base'},{text:th,role:'slot'},{text:'ครับ',role:'polite'}]};
  if(l.slot==='number') return {th:`${th}บาทครับ`, ro:`${ro} bàat khráp`, ka:`${ka} バート クラップ`, jp:`${jp}バーツです。`, parts:[{text:th,role:'slot'},{text:'บาท',role:'soft'},{text:'ครับ',role:'polite'}]};
  if(l.slot==='place') return {th:`ไป${th}ครับ`, ro:`pai ${ro} khráp`, ka:`パイ ${ka} クラップ`, jp:`${jp}へ行きます。`, parts:[{text:'ไป',role:'base'},{text:th,role:'slot'},{text:'ครับ',role:'polite'}]};
  return {th:l.pattern,ro:l.roman,ka:l.kana,jp:l.jp,parts:patternParts(l)};
}
function renderLeft(){
  el('leftScreen').innerHTML = `
    <section class="sheet"><div class="top left"><div class="micro">อ่านป้าย · 看板の入口</div><div class="title">全文字リスト</div><div class="subtitle">地名・駅名・メニューを眺めるための土台</div></div><div class="body"><p class="note">タイ文字は最初から全部読めなくても大丈夫です。まずは形を見慣れて、地名やメニューの「見たことある」を増やします。</p><div class="alphabetGrid">${consonants.map(c=>`<article class="lettercard speakable" data-speak="${c[0]}"><div class="big" lang="th">${c[0]}</div><div class="name">${c[1]}</div><div class="meta">${c[2]}｜${c[3]}</div></article>`).join('')}</div></div></section>
    <section class="sheet"><div class="top left"><div class="micro">สระ · 母音</div><div class="title">母音ミニ表</div><div class="subtitle">看板読みの補助輪</div></div><div class="body"><div class="grid">${vowels.map(v=>`<article class="wordcard speakable" data-speak="${v[0]}"><div class="th" lang="th">${v[0]}</div><div class="roman">${v[1]}</div><div class="kana">${v[2]}</div><div class="jp">${v[3]}</div></article>`).join('')}</div></div></section>
    <section class="sheet"><div class="top left"><div class="micro">เลข · 数字</div><div class="title">数字一覧</div><div class="subtitle">値段・時間・部屋番号</div></div><div class="body"><div class="numgrid">${numbers.map(n=>`<article class="numcard speakable" data-speak="${n[1]}"><div class="arabic">${n[0]}</div><div class="th" lang="th">${n[1]}</div><div class="roman">${n[2]}</div><div class="kana">${n[3]}</div></article>`).join('')}</div></div></section>
    <section class="sheet"><div class="top left"><div class="micro">เสียง · 声調</div><div class="title">声調の聞き分け</div><div class="subtitle">まず耳で別物にする</div></div><div class="body"><div class="toneRow">${tones.map(t=>`<article class="tone speakable" data-speak="${t[3].split('：')[0].split(' ')[0]}"><div class="th">${t[0]}｜${t[1]}</div><div class="jp">${t[2]}：${t[3]}</div></article>`).join('')}</div></div></section>
    <div class="footerNote">ローマ字・カタカナは旅先で口を動かすための補助です。細かい声調と母音の長さは、音声で少しずつ耳に入れていきます。</div>`;
}
function renderRight(){
  const cats = [['all','全部'],['noun','物・設備'],['food','注文'],['number','数字'],['place','場所'],['facility','施設'],['tool','依頼動作'],['health','体調'],['allergy','食事制限'],['booking','変更'],['rec','おすすめ'],['pay','支払い'],['photo','写真'],['repeat','聞き返し'],['shopping','比較'],['direction','道案内'],['trouble','困った時'],['booking2','入場予約'],['answer','返答確認'],['manners','作法']];
  const active = lessons[currentLesson].slot || 'all';
  const filtered = active==='all' ? words : words.filter(w=>w[4]===active || w[4]==='tool');
  el('rightScreen').innerHTML = `<section class="sheet"><div class="top right"><div class="micro">คำศัพท์ · 単語</div><div class="title">単語ストック</div><div class="subtitle">タップで例文に入る</div></div><div class="body" style="background:transparent"><div class="category">${cats.map(c=>`<button class="catbtn ${c[0]===active?'active':''}" data-cat="${c[0]}">${c[1]}</button>`).join('')}</div><p class="note">今開いている課で使いやすい単語を先に出します。単語だけ聞きたい時もタップで再生できます。</p><div class="grid">${filtered.map((w,i)=>`<article class="wordcard speakable wordPick" data-index="${words.indexOf(w)}" data-speak="${w[0]}"><div class="th" lang="th">${w[0]}</div><div class="roman">${w[1]}</div><div class="kana">${w[2]}</div><div class="jp">${w[3]}</div><span class="pill">${labelCat(w[4])}</span></article>`).join('')}</div></div></section>`;
  document.querySelectorAll('.catbtn').forEach(btn=>btn.onclick=()=>renderWordCategory(btn.dataset.cat));
}
function renderWordCategory(cat){
  const cats = [['all','全部'],['noun','物・設備'],['food','注文'],['number','数字'],['place','場所'],['facility','施設'],['tool','依頼動作'],['health','体調'],['allergy','食事制限'],['booking','変更'],['rec','おすすめ'],['pay','支払い'],['photo','写真'],['repeat','聞き返し'],['shopping','比較'],['direction','道案内'],['trouble','困った時'],['booking2','入場予約'],['answer','返答確認'],['manners','作法']];
  const filtered = cat==='all' ? words : words.filter(w=>w[4]===cat);
  el('rightScreen').querySelector('.category').innerHTML = cats.map(c=>`<button class="catbtn ${c[0]===cat?'active':''}" data-cat="${c[0]}">${c[1]}</button>`).join('');
  el('rightScreen').querySelector('.grid').innerHTML = filtered.map(w=>`<article class="wordcard speakable wordPick" data-index="${words.indexOf(w)}" data-speak="${w[0]}"><div class="th" lang="th">${w[0]}</div><div class="roman">${w[1]}</div><div class="kana">${w[2]}</div><div class="jp">${w[3]}</div><span class="pill">${labelCat(w[4])}</span></article>`).join('');
  document.querySelectorAll('.catbtn').forEach(btn=>btn.onclick=()=>renderWordCategory(btn.dataset.cat));
  bindSpeakables();
}
function labelCat(c){return {noun:'物・設備',food:'注文',number:'数字',place:'場所',facility:'施設',tool:'依頼動作',health:'体調',allergy:'食事制限',booking:'変更',rec:'おすすめ',pay:'支払い',photo:'写真',repeat:'聞き返し',shopping:'比較',direction:'道案内',trouble:'困った時',booking2:'入場予約',answer:'返答確認',manners:'作法'}[c]||c}
function toThaiNum(n){const m=['๐','๑','๒','๓','๔','๕','๖','๗','๘','๙']; return String(n).replace(/\d/g,d=>m[Number(d)]);}
function renderTabs(){
  el('lessonTabs').innerHTML = lessons.map((l,i)=>`<button class="tab ${i===currentLesson?'active':''}" data-lesson="${i}">${toThaiNum(i+1)}</button>`).join('');
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{currentLesson=Number(t.dataset.lesson); currentWord=null; renderAll(); setPanel(1);});
}
function renderAll(){renderTabs(); renderLeft(); renderLesson(); renderRight(); bindSpeakables(); setPanel(currentPanel,false)}
function setPanel(p,animate=true){
  currentPanel = Math.max(0,Math.min(2,p));
  const strip=el('strip');
  strip.style.transition = animate ? 'transform .34s cubic-bezier(.18,.82,.24,1)' : 'none';
  strip.style.transform = `translateX(${-currentPanel*33.333333}%)`;
  document.querySelectorAll('.navbtn').forEach((b,i)=>b.classList.toggle('active',i===currentPanel));
}
function bindSpeakables(){
  document.querySelectorAll('.speakable').forEach(node=>{
    node.onclick = (e)=>{
      const isWord = node.classList.contains('wordPick');
      const text = node.dataset.speak;
      if(isWord){
        currentWord = words[Number(node.dataset.index)];
        const l = lessons[currentLesson];
        if(l.slot && currentWord[4]===l.slot){renderLesson(); bindSpeakables(); setPanel(1);}
      }
      speak(text, e.shiftKey);
      markPlaying(node);
    };
    node.ondblclick = ()=>speak(node.dataset.speak,true);
  });
}
function escapeAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
document.querySelectorAll('.navbtn').forEach(btn=>btn.onclick=()=>setPanel(Number(btn.dataset.panel)));
let sx=0,sy=0,dx=0,dy=0;
el('viewport').addEventListener('touchstart',e=>{sx=e.touches[0].clientX; sy=e.touches[0].clientY; dx=dy=0;},{passive:true});
el('viewport').addEventListener('touchmove',e=>{dx=e.touches[0].clientX-sx; dy=e.touches[0].clientY-sy;},{passive:true});
el('viewport').addEventListener('touchend',()=>{if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.2){ if(dx<0) setPanel(currentPanel+1); else setPanel(currentPanel-1); }});
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = ()=>{ cachedVoices = speechSynthesis.getVoices(); }; refreshVoices(); }
renderAll();
setPanel(1,false);
</script>
</body>
